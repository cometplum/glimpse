plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.screenshotbrain'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.screenshotbrain'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Bundled on-device OCR. No cloud OCR, no server.
    implementation 'com.google.mlkit:text-recognition:16.0.1'
}
